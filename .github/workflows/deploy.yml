name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Write SSH key
        run: |
          mkdir -p /home/runner/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /home/runner/.ssh/deploy_key
          chmod 600 /home/runner/.ssh/deploy_key

      - name: Setup SSH config
        run: |
          cat >> /home/runner/.ssh/config << 'EOF'
          Host ssh.shaulva.fr
            ProxyCommand cloudflared access ssh --hostname ssh.shaulva.fr
            StrictHostKeyChecking no
            IdentityFile /home/runner/.ssh/deploy_key
          EOF
          chmod 600 /home/runner/.ssh/config

      - name: Deploy via SSH
        run: |
          ssh -i /home/runner/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname ssh.shaulva.fr" \
              ${{ secrets.SERVER_USER }}@ssh.shaulva.fr \
              "cd /var/www/mon-site && git pull origin main"
